<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock - Multiple Time Zones</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="clock-wrapper">
            <h1>🕐 World Clock</h1>
            
            <div class="main-clock">
                <div class="local-time">
                    <h2 id="localTimeZone">Local Time</h2>
                    <div class="time-display" id="localTime">00:00:00</div>
                    <p id="localDate">Sunday, January 1, 2024</p>
                </div>
            </div>

            <div class="timezone-selector">
                <label for="timezoneSelect">Add Time Zone:</label>
                <select id="timezoneSelect">
                    <option value="">Select a timezone...</option>
                    <option value="UTC">UTC (Coordinated Universal Time)</option>
                    <option value="America/New_York">EST - Eastern Standard Time</option>
                    <option value="America/Chicago">CST - Central Standard Time</option>
                    <option value="America/Denver">MST - Mountain Standard Time</option>
                    <option value="America/Los_Angeles">PST - Pacific Standard Time</option>
                    <option value="America/Anchorage">AKST - Alaska Standard Time</option>
                    <option value="Pacific/Honolulu">HST - Hawaii Standard Time</option>
                    <option value="Europe/London">GMT - Greenwich Mean Time</option>
                    <option value="Europe/Paris">CET - Central European Time</option>
                    <option value="Europe/Moscow">MSK - Moscow Standard Time</option>
                    <option value="Asia/Dubai">GST - Gulf Standard Time</option>
                    <option value="Asia/Kolkata">IST - Indian Standard Time</option>
                    <option value="Asia/Bangkok">ICT - Indochina Time</option>
                    <option value="Asia/Shanghai">CST - China Standard Time</option>
                    <option value="Asia/Tokyo">JST - Japan Standard Time</option>
                    <option value="Asia/Seoul">KST - Korea Standard Time</option>
                    <option value="Australia/Sydney">AEDT - Australian Eastern Time</option>
                    <option value="Pacific/Auckland">NZDT - New Zealand Standard Time</option>
                </select>
                <button id="addBtn" class="btn-add">Add</button>
            </div>

            <div class="timezones-container">
                <div class="timezones-grid" id="timezonesGrid"></div>
            </div>

            <div class="controls">
                <button id="clearAllBtn" class="btn-clear-all">Clear All</button>
                <label class="toggle-label">
                    <input type="checkbox" id="toggleFormat" checked>
                    <span>24-Hour Format</span>
                </label>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
